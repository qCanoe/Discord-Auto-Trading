services:
  - type: worker          # 后台长驻进程，不对外暴露端口 / Background worker, no public port
    name: autotrade-bot
    runtime: python
    region: singapore     # 新加坡节点，绕过 Binance 美国地区限制 / Singapore to avoid Binance US block
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false       # 在 Render Dashboard 手动填写，不写入代码 / Fill in Dashboard, not in code
      - key: CHANNEL_ID
        sync: false
      - key: TRADE_LOG_WEBHOOK_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4.6
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: DEFAULT_LEVERAGE
        value: "10"
      - key: DEFAULT_SIZE_PCT
        value: "10"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"        # 让日志实时输出，不被缓冲 / Unbuffered logs
      - key: DRY_RUN
        value: "false"    # 正式下单模式 / Live trading mode
